<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CodeAlpha URL Shortener</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #060912;
        --surface: rgba(255, 255, 255, 0.04);
        --surface-2: rgba(255, 255, 255, 0.06);
        --border: rgba(255, 255, 255, 0.08);
        --border-strong: rgba(255, 255, 255, 0.16);
        --text: #e8edf6;
        --muted: #8b97ab;
        --faint: #5b6678;
        --accent: #6366f1;
        --accent-2: #22d3ee;
        --accent-3: #a855f7;
        --success: #34d399;
        --danger: #fb7185;
        --shadow: 0 20px 50px -12px rgba(0, 0, 0, 0.6);
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        font-family:
          "Inter",
          system-ui,
          -apple-system,
          sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        position: relative;
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased;
      }

      /* Aurora background blobs */
      .aurora {
        position: fixed;
        inset: 0;
        z-index: -1;
        overflow: hidden;
        pointer-events: none;
      }

      .aurora::before,
      .aurora::after {
        content: "";
        position: absolute;
        width: 60vw;
        height: 60vw;
        border-radius: 50%;
        filter: blur(120px);
        opacity: 0.5;
        animation: float 18s ease-in-out infinite;
      }

      .aurora::before {
        top: -20%;
        left: -10%;
        background: radial-gradient(circle, #6366f1, transparent 70%);
      }

      .aurora::after {
        bottom: -25%;
        right: -10%;
        background: radial-gradient(circle, #a855f7, transparent 70%);
        animation-delay: -9s;
      }

      .aurora-3 {
        position: absolute;
        top: 30%;
        left: 50%;
        width: 40vw;
        height: 40vw;
        transform: translateX(-50%);
        border-radius: 50%;
        background: radial-gradient(circle, #22d3ee, transparent 70%);
        filter: blur(130px);
        opacity: 0.28;
        animation: float 22s ease-in-out infinite reverse;
      }

      @keyframes float {
        0%,
        100% {
          transform: translate(0, 0) scale(1);
        }
        50% {
          transform: translate(4%, 6%) scale(1.1);
        }
      }

      /* Header */
      header {
        position: sticky;
        top: 0;
        z-index: 20;
        background: rgba(6, 9, 18, 0.55);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        padding: 16px 32px;
        display: flex;
        align-items: center;
        gap: 14px;
        border-bottom: 1px solid var(--border);
      }

      .logo {
        width: 38px;
        height: 38px;
        display: grid;
        place-items: center;
        border-radius: 11px;
        font-size: 1.1rem;
        background: linear-gradient(135deg, var(--accent), var(--accent-3));
        box-shadow: 0 8px 24px -6px rgba(99, 102, 241, 0.7);
      }

      header h1 {
        font-size: 1.15rem;
        font-weight: 700;
        letter-spacing: -0.02em;
      }

      header .tag {
        margin-left: auto;
        font-size: 0.78rem;
        color: var(--muted);
        padding: 6px 12px;
        border: 1px solid var(--border);
        border-radius: 999px;
        background: var(--surface);
      }

      .container {
        max-width: 820px;
        margin: 0 auto;
        padding: 72px 20px 80px;
      }

      /* Hero */
      .hero {
        text-align: center;
        margin-bottom: 44px;
      }

      .hero .pill {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-size: 0.78rem;
        font-weight: 500;
        color: var(--accent-2);
        padding: 6px 14px;
        border-radius: 999px;
        border: 1px solid var(--border-strong);
        background: var(--surface);
        margin-bottom: 22px;
      }

      .hero .pill::before {
        content: "";
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--accent-2);
        box-shadow: 0 0 12px var(--accent-2);
      }

      .hero h2 {
        font-size: clamp(2.1rem, 5vw, 3.2rem);
        font-weight: 800;
        line-height: 1.05;
        letter-spacing: -0.04em;
        margin-bottom: 16px;
        background: linear-gradient(135deg, #fff 30%, #a5b4fc 70%, #22d3ee);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .hero p {
        color: var(--muted);
        font-size: 1.05rem;
        max-width: 480px;
        margin: 0 auto;
      }

      /* Cards */
      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 26px;
        margin-bottom: 26px;
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        box-shadow: var(--shadow);
      }

      .card.shorten {
        padding: 30px;
      }

      .input-group {
        display: flex;
        gap: 12px;
      }

      .input-wrap {
        flex: 1;
        position: relative;
        display: flex;
        align-items: center;
      }

      .input-wrap svg {
        position: absolute;
        left: 16px;
        width: 18px;
        height: 18px;
        color: var(--faint);
        pointer-events: none;
      }

      .input-group input {
        width: 100%;
        padding: 15px 16px 15px 46px;
        border-radius: 13px;
        border: 1px solid var(--border-strong);
        background: rgba(0, 0, 0, 0.25);
        color: var(--text);
        font-size: 0.95rem;
        font-family: inherit;
        outline: none;
        transition:
          border-color 0.2s,
          box-shadow 0.2s,
          background 0.2s;
      }

      .input-group input:focus {
        border-color: var(--accent);
        background: rgba(0, 0, 0, 0.35);
        box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.18);
      }

      .input-group input::placeholder {
        color: var(--faint);
      }

      .btn {
        border: none;
        cursor: pointer;
        font-size: 0.95rem;
        font-weight: 600;
        font-family: inherit;
        border-radius: 13px;
        transition:
          transform 0.15s,
          box-shadow 0.2s,
          opacity 0.2s,
          background 0.2s;
      }

      .btn:active {
        transform: translateY(1px) scale(0.99);
      }

      .btn-primary {
        padding: 15px 26px;
        color: #fff;
        background: linear-gradient(135deg, var(--accent), var(--accent-3));
        box-shadow: 0 10px 28px -8px rgba(99, 102, 241, 0.75);
        white-space: nowrap;
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }

      .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 16px 36px -8px rgba(99, 102, 241, 0.9);
      }

      .btn-primary:disabled {
        opacity: 0.6;
        cursor: wait;
        transform: none;
      }

      .btn-ghost {
        padding: 9px 16px;
        font-size: 0.82rem;
        color: var(--muted);
        background: var(--surface-2);
        border: 1px solid var(--border-strong);
        display: inline-flex;
        align-items: center;
        gap: 7px;
      }

      .btn-ghost:hover {
        color: var(--text);
        border-color: var(--accent);
      }

      .btn-danger {
        background: transparent;
        color: var(--danger);
        border: 1px solid rgba(251, 113, 133, 0.4);
        padding: 8px 14px;
        font-size: 0.8rem;
        border-radius: 9px;
      }

      .btn-danger:hover {
        background: var(--danger);
        color: #fff;
        border-color: var(--danger);
      }

      /* Result box */
      #result-box {
        margin-top: 20px;
        padding: 18px;
        border-radius: 14px;
        display: none;
        animation: pop 0.35s cubic-bezier(0.2, 0.9, 0.3, 1.3);
      }

      @keyframes pop {
        from {
          opacity: 0;
          transform: translateY(8px) scale(0.98);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      #result-box.success {
        background: linear-gradient(
          135deg,
          rgba(52, 211, 153, 0.12),
          rgba(34, 211, 238, 0.06)
        );
        border: 1px solid rgba(52, 211, 153, 0.35);
      }

      #result-box.error {
        background: rgba(251, 113, 133, 0.08);
        border: 1px solid rgba(251, 113, 133, 0.35);
      }

      #result-box .label {
        font-size: 0.78rem;
        color: var(--muted);
        margin-bottom: 8px;
        font-weight: 500;
      }

      .result-row {
        display: flex;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
      }

      #result-box .short-url {
        font-family: "JetBrains Mono", monospace;
        font-size: 1.05rem;
        font-weight: 600;
        flex: 1;
        min-width: 200px;
      }

      #result-box .short-url a {
        color: var(--success);
        text-decoration: none;
      }

      #result-box .short-url a:hover {
        text-decoration: underline;
      }

      #result-box .copy-btn {
        background: rgba(52, 211, 153, 0.15);
        color: var(--success);
        padding: 10px 16px;
        border: 1px solid rgba(52, 211, 153, 0.4);
        border-radius: 10px;
        cursor: pointer;
        font-size: 0.85rem;
        font-weight: 600;
        font-family: inherit;
        display: inline-flex;
        align-items: center;
        gap: 7px;
        transition: all 0.2s;
      }

      #result-box .copy-btn:hover {
        background: var(--success);
        color: #06140e;
      }

      #result-box .error-msg {
        color: #fda4af;
        font-size: 0.95rem;
        font-weight: 500;
      }

      /* Section title */
      .section-title {
        font-size: 1.05rem;
        font-weight: 700;
        margin-bottom: 18px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .section-title .left {
        display: inline-flex;
        align-items: center;
        gap: 9px;
      }

      .section-title .count {
        font-size: 0.72rem;
        font-weight: 600;
        color: var(--accent-2);
        background: rgba(34, 211, 238, 0.12);
        border: 1px solid rgba(34, 211, 238, 0.3);
        padding: 3px 9px;
        border-radius: 999px;
      }

      .url-list {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .url-item {
        background: rgba(0, 0, 0, 0.22);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 16px 18px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 14px;
        transition:
          border-color 0.2s,
          transform 0.2s,
          background 0.2s;
        animation: slideIn 0.35s ease both;
      }

      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .url-item:hover {
        border-color: var(--border-strong);
        background: rgba(0, 0, 0, 0.3);
        transform: translateX(3px);
      }

      .url-item .info {
        flex: 1;
        overflow: hidden;
      }

      .url-item .short {
        color: var(--accent-2);
        font-weight: 600;
        font-size: 0.98rem;
        font-family: "JetBrains Mono", monospace;
        text-decoration: none;
      }

      .url-item .short:hover {
        text-decoration: underline;
      }

      .url-item .original {
        font-size: 0.8rem;
        color: var(--faint);
        margin-top: 4px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .url-item .meta {
        font-size: 0.72rem;
        color: var(--faint);
        margin-top: 5px;
      }

      .url-item .actions {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-shrink: 0;
      }

      .badge {
        background: rgba(99, 102, 241, 0.15);
        color: #c7d2fe;
        border: 1px solid rgba(99, 102, 241, 0.3);
        padding: 5px 11px;
        border-radius: 999px;
        font-size: 0.74rem;
        font-weight: 600;
        white-space: nowrap;
      }

      .empty-state {
        text-align: center;
        color: var(--muted);
        padding: 44px 20px;
        font-size: 0.95rem;
      }

      .empty-state .emoji {
        font-size: 2.4rem;
        display: block;
        margin-bottom: 12px;
        opacity: 0.7;
      }

      /* Skeleton loader */
      .skeleton {
        height: 74px;
        border-radius: 14px;
        background: linear-gradient(
          100deg,
          rgba(255, 255, 255, 0.04) 30%,
          rgba(255, 255, 255, 0.09) 50%,
          rgba(255, 255, 255, 0.04) 70%
        );
        background-size: 200% 100%;
        animation: shimmer 1.4s infinite;
      }

      @keyframes shimmer {
        from {
          background-position: 200% 0;
        }
        to {
          background-position: -200% 0;
        }
      }

      /* Toast */
      #toast {
        position: fixed;
        bottom: 28px;
        left: 50%;
        transform: translateX(-50%) translateY(120%);
        background: rgba(16, 20, 32, 0.92);
        backdrop-filter: blur(14px);
        border: 1px solid var(--border-strong);
        color: var(--text);
        padding: 13px 20px;
        border-radius: 14px;
        font-size: 0.9rem;
        font-weight: 500;
        box-shadow: var(--shadow);
        z-index: 50;
        display: flex;
        align-items: center;
        gap: 10px;
        opacity: 0;
        transition:
          transform 0.4s cubic-bezier(0.2, 0.9, 0.3, 1.3),
          opacity 0.3s;
      }

      #toast.show {
        transform: translateX(-50%) translateY(0);
        opacity: 1;
      }

      #toast.success {
        border-color: rgba(52, 211, 153, 0.5);
      }
      #toast.error {
        border-color: rgba(251, 113, 133, 0.5);
      }

      @media (max-width: 560px) {
        .input-group {
          flex-direction: column;
        }
        .btn-primary {
          justify-content: center;
        }
        header .tag {
          display: none;
        }
        .container {
          padding-top: 48px;
        }
      }
    </style>
  </head>
  <body>
    <div class="aurora"><div class="aurora-3"></div></div>

    <header>
      <div class="logo">🔗</div>
      <h1>URL Shortener</h1>
      <span class="tag">CodeAlpha Internship - Task 1</span>
    </header>

    <div class="container">
      <div class="hero">
        <span class="pill">Fast &amp; free link shortening</span>
        <h2>Shorten your links<br />in a single click</h2>
        <p>Paste a long URL and get a clean, shareable short link instantly.</p>
      </div>

      <!-- Shorten Form -->
      <div class="card shorten">
        <div class="input-group">
          <div class="input-wrap">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path
                d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"
              />
              <path
                d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"
              />
            </svg>
            <input
              type="text"
              id="urlInput"
              placeholder="https://example.com/very/long/url/here"
              autocomplete="off"
            />
          </div>
          <button
            class="btn btn-primary"
            id="shortenBtn"
            onclick="shortenUrl()"
          >
            <svg
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M5 12h14M13 6l6 6-6 6" />
            </svg>
            Shorten
          </button>
        </div>

        <!-- Result Box -->
        <div id="result-box"></div>
      </div>

      <!-- All URLs List -->
      <div class="card">
        <div class="section-title">
          <span class="left">
            📋 All Shortened URLs
            <span class="count" id="url-count">0</span>
          </span>
          <button class="btn btn-ghost" onclick="loadUrls()">
            <svg
              width="14"
              height="14"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M21 12a9 9 0 1 1-2.64-6.36M21 3v6h-6" />
            </svg>
            Refresh
          </button>
        </div>
        <div id="url-list" class="url-list">
          <div class="skeleton"></div>
          <div class="skeleton"></div>
        </div>
      </div>
    </div>

    <div id="toast"></div>

    <script>
      const BASE = window.location.origin;

      async function shortenUrl() {
        const input = document.getElementById("urlInput");
        const btn = document.getElementById("shortenBtn");
        const url = input.value.trim();

        if (!url) {
          showResult("error", "Please enter a URL.");
          return;
        }

        btn.disabled = true;
        try {
          const res = await fetch(`${BASE}/api/shorten`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ originalUrl: url }),
          });

          const data = await res.json();

          if (!res.ok) {
            showResult("error", data.error || "Something went wrong.");
            return;
          }

          showResult("success", null, data.shortUrl);
          input.value = "";
          loadUrls();
        } catch (err) {
          showResult("error", "Could not connect to the server.");
        } finally {
          btn.disabled = false;
        }
      }

      function showResult(type, message, shortUrl) {
        const box = document.getElementById("result-box");
        box.style.display = "block";
        box.className = type;

        if (type === "success") {
          box.innerHTML = `
        <div class="label">✅ Your short URL is ready</div>
        <div class="result-row">
          <div class="short-url"><a href="${shortUrl}" target="_blank">${shortUrl}</a></div>
          <button class="copy-btn" onclick="copyToClipboard('${shortUrl}')">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            Copy
          </button>
        </div>
      `;
        } else {
          box.innerHTML = `<div class="error-msg">❌ ${message}</div>`;
        }
      }

      function copyToClipboard(text) {
        navigator.clipboard.writeText(text).then(() => {
          showToast("Short URL copied to clipboard!", "success");
        });
      }

      function showToast(message, type = "") {
        const toast = document.getElementById("toast");
        toast.textContent = message;
        toast.className = `show ${type}`;
        clearTimeout(toast._t);
        toast._t = setTimeout(() => {
          toast.className = type;
        }, 2600);
      }

      async function loadUrls() {
        const listDiv = document.getElementById("url-list");
        const countEl = document.getElementById("url-count");
        listDiv.innerHTML = `<div class="skeleton"></div><div class="skeleton"></div>`;

        try {
          const res = await fetch(`${BASE}/api/all`);
          const urls = await res.json();

          countEl.textContent = urls.length;

          if (!urls.length) {
            listDiv.innerHTML = `<div class="empty-state"><span class="emoji">🪄</span>No URLs shortened yet. Go ahead and try!</div>`;
            return;
          }

          listDiv.innerHTML = urls
            .map(
              (u, i) => `
        <div class="url-item" id="item-${u.shortCode}" style="animation-delay:${i * 50}ms">
          <div class="info">
            <a class="short" href="${u.shortUrl}" target="_blank">${u.shortUrl}</a>
            <div class="original" title="${u.originalUrl}">${u.originalUrl}</div>
            <div class="meta">🕒 ${new Date(u.createdAt).toLocaleString()}</div>
          </div>
          <div class="actions">
            <span class="badge">👁 ${u.clicks} click${u.clicks !== 1 ? "s" : ""}</span>
            <button class="btn btn-danger" onclick="deleteUrl('${u.shortCode}')">Delete</button>
          </div>
        </div>
      `,
            )
            .join("");
        } catch (err) {
          listDiv.innerHTML = `<div class="empty-state"><span class="emoji">⚠️</span>Failed to load URLs.</div>`;
        }
      }

      async function deleteUrl(shortCode) {
        if (!confirm("Delete this short URL?")) return;
        try {
          const res = await fetch(`${BASE}/api/delete/${shortCode}`, {
            method: "DELETE",
          });
          if (res.ok) {
            document.getElementById(`item-${shortCode}`)?.remove();
            showToast("Short URL deleted.", "success");
            const list = document.getElementById("url-list");
            const countEl = document.getElementById("url-count");
            const remaining = list.querySelectorAll(".url-item").length;
            countEl.textContent = remaining;
            if (!remaining) {
              list.innerHTML = `<div class="empty-state"><span class="emoji">🪄</span>No URLs shortened yet. Go ahead and try!</div>`;
            }
          }
        } catch (err) {
          showToast("Failed to delete.", "error");
        }
      }

      // Load URLs on page start
      loadUrls();

      // Allow pressing Enter in input
      document
        .getElementById("urlInput")
        .addEventListener("keypress", function (e) {
          if (e.key === "Enter") shortenUrl();
        });
    </script>
  </body>
</html>
